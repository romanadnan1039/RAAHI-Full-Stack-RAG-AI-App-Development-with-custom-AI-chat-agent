services:
  - type: web
    name: raahi-backend-and-agent
    env: node
    region: oregon # Or your preferred Render region
    plan: free
    buildCommand: "cd backend && npm install && npm install http-proxy-middleware && npx prisma generate && npm run build && cd ../ai-agent && npm install && npm run build"
    startCommand: "cd ai-agent && npm start & cd backend && npm start & wait -n"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: AI_AGENT_URL
        value: "http://localhost:5001"
